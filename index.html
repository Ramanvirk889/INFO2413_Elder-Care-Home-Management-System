<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elder Care Home Management System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel= "stylesheet" href="style.css">
</head>
<body class="idx_body">
    
   
<form class="idx_form" action='' method= 'post'><fieldset><br>
    <h2 class="idx_login">Login to your account</h2>
<div class="idx_img_container">
        <img src="image.png" alt="Elder Care Home" class="idx_img">
      

          </div>


<label class="form-label">Username/Email</label><input class="idx_input" type="email" id="email" name="email" placeholder="Enter username or email">

<label class="form-label">Password</label><input class="idx_input" type="password" id="password" name="password" placeholder="Enter password">
<a href="/index.html"class="idx_link">forgot password</a>


<div class="btn_container">
<button type="submit" class="idx_btn" name="login" id="login">Login</button>
<button type= "reset"  class="idx_btn" id="cancel" name="register" id="register">Cancel</button></div>

</fieldset>
</form>
   
</body>
</html>
