   <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elder Care Home Management System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel= "stylesheet" href="style.css">
</head>
<body class="idx_body">

<div class="index_form"> 
    <h2 class="register_user">Register your account</h2>
   
<form action='' method= 'post'><fieldset><br>


<label class="form-label">Full name: </label><input type="name" id="name" name="name" placeholder="Enter your name">
<label class="form-label">DOB(mm-dd-yy):</label><input type="date" id="date" name="date" >
<label class="form-label">Email/Username: </label><input type="email" id="email" name="email" placeholder="Enter your email">

<label class="form-label">Password:</label><input type="password" id="password" name="password" placeholder="Enter password">



<div class="btn_container">
<button type="submit" class="idx_btn"  name="register" id="register">Register</button>
<button type= "reset" class='idx_btn' name="cancel" id="cancel">Cancel</button></div>

</fieldset>
</form>
</div>   
</body>
</html>
